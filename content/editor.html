<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOIS — Content Editor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Menlo, Monaco, 'Courier New', monospace;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            padding: 40px;
        }
        
        .header {
            border-bottom: 1px solid #333;
            padding-bottom: 30px;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 24px;
            letter-spacing: 8px;
            color: #7C120C;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 12px;
            color: #888;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }
        
        .panel {
            background: #111;
            border: 1px solid #333;
            padding: 30px;
        }
        
        .panel h2 {
            font-size: 14px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #7C120C;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 8px;
        }
        
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            background: #0a0a0a;
            border: 1px solid #333;
            color: #fff;
            padding: 12px 15px;
            font-family: Menlo, Monaco, monospace;
            font-size: 13px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: #7C120C;
        }
        
        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            background: #7C120C;
            border: none;
            color: #fff;
            font-family: Menlo, Monaco, monospace;
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .btn:hover {
            background: #E23C28;
        }
        
        .btn-secondary {
            background: #333;
            margin-top: 10px;
        }
        
        .btn-secondary:hover {
            background: #444;
        }
        
        .content-list {
            max-height: 600px;
            overflow-y: auto;
        }
        
        .content-item {
            background: #0a0a0a;
            border: 1px solid #222;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: border-color 0.3s;
        }
        
        .content-item:hover {
            border-color: #7C120C;
        }
        
        .content-item.active {
            border-color: #E23C28;
            background: #1a1a1a;
        }
        
        .content-item .code {
            font-size: 11px;
            color: #E23C28;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        
        .content-item .text {
            font-size: 12px;
            color: #ccc;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .content-item .page {
            font-size: 9px;
            color: #666;
            margin-top: 5px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        .search-box {
            margin-bottom: 20px;
        }
        
        .notification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #7C120C;
            color: #fff;
            padding: 15px 30px;
            font-size: 12px;
            letter-spacing: 2px;
            transform: translateX(120%);
            transition: transform 0.4s ease;
            z-index: 1000;
        }
        
        .notification.show {
            transform: translateX(0);
        }
        
        .quick-links {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #333;
        }
        
        .quick-links h3 {
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 15px;
        }
        
        .quick-links a {
            display: inline-block;
            padding: 10px 20px;
            background: #0a0a0a;
            border: 1px solid #333;
            color: #fff;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-right: 10px;
            margin-bottom: 10px;
            transition: all 0.3s;
        }
        
        .quick-links a:hover {
            border-color: #7C120C;
            background: #7C120C;
        }
        
        .tabs {
            display: flex;
            gap: 2px;
            margin-bottom: 20px;
            background: #0a0a0a;
            padding: 5px;
        }
        
        .tab {
            padding: 10px 20px;
            background: transparent;
            border: none;
            color: #888;
            font-family: Menlo, Monaco, monospace;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .tab.active {
            background: #7C120C;
            color: #fff;
        }
        
        .tab:hover {
            color: #fff;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .export-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #333;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>JOIS CONTENT EDITOR</h1>
        <p>Edita textos usando códigos. Selecciona el código, escribe el nuevo texto y guarda.</p>
    </div>
    
    <div class="container">
        <div class="panel">
            <h2>Editar Contenido</h2>
            
            <div class="form-group">
                <label>Código del texto</label>
                <input type="text" id="contentCode" placeholder="Ej: hero_title">
            </div>
            
            <div class="form-group">
                <label>Nuevo texto</label>
                <textarea id="contentText" placeholder="Escribe el nuevo texto aquí..."></textarea>
            </div>
            
            <button class="btn" onclick="updateContent()">Actualizar Texto</button>
            <button class="btn btn-secondary" onclick="resetForm()">Limpiar</button>
            
            <div class="quick-links">
                <h3>Vista Previa</h3>
                <a href="index.html" target="_blank">Tienda</a>
                <a href="nft.html" target="_blank">NFTs</a>
                <a href="media-editor.html" target="_blank">Media Manager</a>
            </div>
            
            <div class="export-section">
                <h3 style="font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: #888; margin-bottom: 15px;">Exportar Cambios</h3>
                <button class="btn btn-secondary" onclick="exportJSON()">Descargar texts.json</button>
            </div>
        </div>
        
        <div class="panel">
            <h2>Lista de Textos</h2>
            
            <div class="tabs">
                <button class="tab active" onclick="filterTab('index')">Tienda</button>
                <button class="tab" onclick="filterTab('nft')">NFTs</button>
                <button class="tab" onclick="filterTab('all')">Todos</button>
            </div>
            
            <div class="search-box">
                <input type="text" id="searchBox" placeholder="Buscar código o texto..." oninput="searchContent()">
            </div>
            
            <div class="content-list" id="contentList">
                <!-- Content items will be loaded here -->
            </div>
        </div>
    </div>
    
    <div class="notification" id="notification"></div>
    
    <script>
        let contentData = {};
        let currentFilter = 'all';
        
        // Load content
        async function loadContent() {
            try {
                const response = await fetch('content/texts.json');
                const data = await response.json();
                contentData = data.store;
                renderContentList();
            } catch (error) {
                console.error('Error loading content:', error);
                showNotification('Error cargando contenido');
            }
        }
        
        // Render content list
        function renderContentList() {
            const list = document.getElementById('contentList');
            list.innerHTML = '';
            
            let items = [];
            
            for (const [page, texts] of Object.entries(contentData)) {
                if (currentFilter !== 'all' && page !== currentFilter) continue;
                
                for (const [code, text] of Object.entries(texts)) {
                    items.push({ page, code, text });
                }
            }
            
            items.sort((a, b) => a.code.localeCompare(b.code));
            
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'content-item';
                div.innerHTML = `
                    <div class="code">${item.code}</div>
                    <div class="text">${item.text}</div>
                    <div class="page">${item.page}</div>
                `;
                div.onclick = () => selectItem(item);
                list.appendChild(div);
            });
        }
        
        // Filter tabs
        function filterTab(tab) {
            currentFilter = tab;
            
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            renderContentList();
        }
        
        // Search
        function searchContent() {
            const query = document.getElementById('searchBox').value.toLowerCase();
            const items = document.querySelectorAll('.content-item');
            
            items.forEach(item => {
                const code = item.querySelector('.code').textContent.toLowerCase();
                const text = item.querySelector('.text').textContent.toLowerCase();
                
                if (code.includes(query) || text.includes(query)) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
        }
        
        // Select item
        function selectItem(item) {
            document.getElementById('contentCode').value = item.code;
            document.getElementById('contentText').value = item.text;
            
            document.querySelectorAll('.content-item').forEach(i => i.classList.remove('active'));
            event.target.closest('.content-item').classList.add('active');
        }
        
        // Update content
        function updateContent() {
            const code = document.getElementById('contentCode').value.trim();
            const text = document.getElementById('contentText').value.trim();
            
            if (!code || !text) {
                showNotification('Completa ambos campos');
                return;
            }
            
            // Find and update
            let found = false;
            for (const [page, texts] of Object.entries(contentData)) {
                if (texts.hasOwnProperty(code)) {
                    contentData[page][code] = text;
                    found = true;
                    break;
                }
            }
            
            if (!found) {
                showNotification('Código no encontrado');
                return;
            }
            
            // Update localStorage for persistence
            localStorage.setItem('jois_content', JSON.stringify(contentData));
            
            showNotification('✓ Texto actualizado');
            renderContentList();
        }
        
        // Reset form
        function resetForm() {
            document.getElementById('contentCode').value = '';
            document.getElementById('contentText').value = '';
            document.querySelectorAll('.content-item').forEach(i => i.classList.remove('active'));
        }
        
        // Export JSON
        function exportJSON() {
            const dataStr = JSON.stringify({ store: contentData }, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = 'texts.json';
            a.click();
            
            showNotification('✓ JSON descargado');
        }
        
        // Notification
        function showNotification(message) {
            const notif = document.getElementById('notification');
            notif.textContent = message;
            notif.classList.add('show');
            
            setTimeout(() => {
                notif.classList.remove('show');
            }, 3000);
        }
        
        // Load on init
        loadContent();
    </script>
</body>
</html>

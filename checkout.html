<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout — JOIS</title>
    <link rel="stylesheet" href="styles-animation.css">
    <link rel="stylesheet" href="styles-luxury.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    
    <style>
        /* ============================================
           JOIS CHECKOUT - MINIMAL DARK
           ============================================ */
        
        * { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #000000;
            color: #F5F5F0;
            font-weight: 300;
            min-height: 100vh;
        }
        
        .checkout-page {
            min-height: 100vh;
            background: #000000;
            padding: 80px 40px;
        }
        
        .checkout-inner {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .checkout-logo {
            font-family: 'Times New Roman MT', serif;
            font-size: 24px;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: #F5F5F0;
            text-align: center;
            margin-bottom: 60px;
        }
        
        .checkout-header {
            text-align: center;
            margin-bottom: 60px;
        }
        
        .checkout-title {
            font-family: 'Times New Roman MT', serif;
            font-size: 32px;
            letter-spacing: 0.05em;
            color: #F5F5F0;
            margin-bottom: 10px;
        }
        
        .checkout-subtitle {
            font-size: 12px;
            letter-spacing: 0.1em;
            color: rgba(245, 245, 240, 0.5);
        }
        
        /* Order Summary */
        .order-summary {
            margin-bottom: 60px;
            border-bottom: 1px solid #3A3A3A;
            padding-bottom: 40px;
        }
        
        .order-items {
            margin-bottom: 30px;
        }
        
        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #3A3A3A;
        }
        
        .order-item:last-child {
            border-bottom: none;
        }
        
        .order-item-name {
            font-size: 14px;
            color: #F5F5F0;
            letter-spacing: 0.02em;
        }
        
        .order-item-price {
            font-family: 'Menlo', monospace;
            font-size: 14px;
            color: rgba(245, 245, 240, 0.6);
        }
        
        .order-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 20px;
        }
        
        .order-total-label {
            font-size: 11px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(245, 245, 240, 0.5);
        }
        
        .order-total-amount {
            font-family: 'Menlo', monospace;
            font-size: 24px;
            color: #F5F5F0;
        }
        
        .order-total-secondary {
            display: block;
            font-size: 12px;
            color: rgba(245, 245, 240, 0.5);
            text-align: right;
            margin-top: 5px;
        }
        
        /* Contact Form */
        .contact-section {
            margin-bottom: 40px;
        }
        
        .section-label {
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(245, 245, 240, 0.5);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #3A3A3A;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .form-group.full {
            grid-column: 1 / -1;
        }
        
        .form-label {
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(245, 245, 240, 0.7);
        }
        
        .form-label span {
            color: #C4A35A;
        }
        
        .form-input {
            padding: 16px 20px;
            font-size: 14px;
            font-family: inherit;
            background: #0A0A0A;
            border: 1px solid #3A3A3A;
            color: #F5F5F0;
            transition: border-color 0.3s;
            outline: none;
        }
        
        .form-input:focus {
            border-color: #F5F5F0;
        }
        
        .form-input::placeholder {
            color: rgba(245, 245, 240, 0.3);
        }
        
        /* WhatsApp CTA */
        .checkout-cta {
            margin-top: 40px;
        }
        
        .btn-whatsapp {
            width: 100%;
            padding: 25px;
            font-size: 12px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            background: #000000;
            color: #F5F5F0;
            border: 1px solid #3A3A3A;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        
        .btn-whatsapp:hover {
            background: #F5F5F0;
            color: #000000;
        }
        
        .btn-whatsapp svg {
            width: 20px;
            height: 20px;
        }
        
        /* Footer Note */
        .checkout-note {
            text-align: center;
            margin-top: 30px;
            font-size: 11px;
            color: rgba(245, 245, 240, 0.4);
            letter-spacing: 0.05em;
        }
        
        /* Responsive */
        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .checkout-page {
                padding: 60px 20px;
            }
        }
    </style>
</head>
<body class="scanlines">
    <!-- Background Effects -->
    <div class="bg-particles"></div>
    <div class="bg-grid"></div>
    <div class="ambient-glow"></div>
    
    <div class="checkout-page">
        <div class="checkout-inner">
            <a href="index.html" class="checkout-logo">JOIS</a>
            
            <div class="checkout-header">
                <h1 class="checkout-title">Checkout</h1>
                <p class="checkout-subtitle">Completa tu orden</p>
            </div>
            
            <!-- Order Summary -->
            <div class="order-summary">
                <div class="order-items" id="orderItems">
                    <!-- Items populated by JS -->
                </div>
                
                <div class="order-total">
                    <span class="order-total-label">Total</span>
                    <div>
                        <span class="order-total-amount" id="orderTotalMXN">$0 MXN</span>
                        <span class="order-total-secondary" id="orderTotalUSD">$0 USD</span>
                    </div>
                </div>
            </div>
            
            <!-- Contact Info -->
            <div class="contact-section">
                <div class="section-label">Información de Contacto</div>
                
                <div class="form-group full">
                    <label class="form-label">Email <span>*</span></label>
                    <input type="email" class="form-input" placeholder="tu@email.com" required>
                </div>
                
                <div class="form-group full">
                    <label class="form-label">WhatsApp <span>*</span></label>
                    <input type="tel" class="form-input" placeholder="+52 55 1234 5678" required>
                </div>
            </div>
            
            <!-- Shipping Info -->
            <div class="contact-section">
                <div class="section-label">Dirección de Envío</div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Nombre <span>*</span></label>
                        <input type="text" class="form-input" placeholder="Nombre" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Apellido <span>*</span></label>
                        <input type="text" class="form-input" placeholder="Apellido" required>
                    </div>
                </div>
                
                <div class="form-group full">
                    <label class="form-label">Dirección <span>*</span></label>
                    <input type="text" class="form-input" placeholder="Calle y número" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Ciudad <span>*</span></label>
                        <input type="text" class="form-input" placeholder="Ciudad" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Código Postal <span>*</span></label>
                        <input type="text" class="form-input" placeholder="CP" required>
                    </div>
                </div>
                
                <div class="form-group full">
                    <label class="form-label">Estado <span>*</span></label>
                    <input type="text" class="form-input" placeholder="Estado" required>
                </div>
            </div>
            
            <!-- WhatsApp CTA -->
            <div class="checkout-cta">
                <button class="btn-whatsapp" id="btnWhatsApp">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                    </svg>
                    Continuar via WhatsApp
                </button>
            </div>
            
            <p class="checkout-note">Tus datos están protegidos. El pago se realiza directamente via WhatsApp.</p>
        </div>
    </div>
    
    <script src="app-cart.js"></script>
    <script>
        // Populate order items from cart
        function populateOrderItems() {
            const orderItems = document.getElementById('orderItems');
            const orderTotalMXN = document.getElementById('orderTotalMXN');
            const orderTotalUSD = document.getElementById('orderTotalUSD');
            
            if (typeof cart !== 'undefined' && cart.items.length > 0) {
                let html = '';
                let totalMXN = 0;
                
                cart.items.forEach(item => {
                    const mxn = Math.round(item.price * 17.50);
                    totalMXN += mxn;
                    html += `
                        <div class="order-item">
                            <span class="order-item-name">${item.name}</span>
                            <span class="order-item-price">$${mxn.toLocaleString('es-MX')} MXN</span>
                        </div>
                    `;
                });
                
                orderItems.innerHTML = html;
                orderTotalMXN.textContent = '$' + totalMXN.toLocaleString('es-MX') + ' MXN';
                orderTotalUSD.textContent = '$' + (totalMXN / 17.50).toLocaleString('es-MX', {minimumFractionDigits: 2}) + ' USD';
            } else {
                orderItems.innerHTML = '<div class="order-item"><span class="order-item-name">Tu carrito está vacío</span></div>';
            }
        }
        
        // WhatsApp CTA
        document.getElementById('btnWhatsApp').addEventListener('click', function() {
            if (typeof cart !== 'undefined' && cart.items.length > 0) {
                let message = 'Hola JOIS! Quiero completar mi pedido:\n\n';
                cart.items.forEach(item => {
                    const mxn = Math.round(item.price * 17.50);
                    message += '- ' + item.name + ' | $' + mxn.toLocaleString('es-MX') + ' MXN\n';
                });
                message += '\nTotal: $' + cart.totalMXN.toLocaleString('es-MX') + ' MXN';
                
                const whatsappUrl = 'https://wa.me/5215512345678?text=' + encodeURIComponent(message);
                window.open(whatsappUrl, '_blank');
            }
        });
        
        // Initialize
        if (typeof initCart === 'function') {
            initCart();
        }
        populateOrderItems();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOIS — 3D Showcase</title>
    <link rel="stylesheet" href="styles-product.css">
    <link rel="stylesheet" href="styles-luxury.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    
    <style>
        /* ============================================
           3D SHOWCASE - PREMIUM PRODUCT PAGE
           ============================================ */
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0A0A0A;
            color: #F5F5F0;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* Showcase Container */
        .showcase-container {
            min-height: 100vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: 
                radial-gradient(ellipse at 30% 20%, rgba(196, 163, 90, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(196, 163, 90, 0.03) 0%, transparent 50%),
                #0A0A0A;
        }
        
        /* Background Text */
        .bg-text-3d {
            position: absolute;
            font-family: 'Arial Black', 'Impact', sans-serif;
            font-size: clamp(100px, 25vw, 300px);
            font-weight: 900;
            text-transform: uppercase;
            color: transparent;
            -webkit-text-stroke: 2px rgba(196, 163, 90, 0.08);
            text-shadow: 
                0 0 80px rgba(196, 163, 90, 0.1),
                0 0 120px rgba(196, 163, 90, 0.05);
            z-index: 1;
            user-select: none;
            letter-spacing: 0.1em;
            white-space: nowrap;
        }
        
        .bg-text-3d.left { top: 10%; left: -5%; }
        .bg-text-3d.right { bottom: 10%; right: -5%; }
        
        /* Glass Card */
        .glass-card {
            position: relative;
            width: 100%;
            max-width: 1000px;
            background: rgba(26, 26, 26, 0.6);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(196, 163, 90, 0.2);
            border-radius: 24px;
            overflow: hidden;
            z-index: 10;
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.5),
                0 0 100px rgba(196, 163, 90, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }
        
        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }
        
        /* Top Bar */
        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .card-nav {
            display: flex;
            gap: 20px;
        }
        
        .card-nav a {
            font-family: 'Menlo', monospace;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            transition: color 0.3s;
        }
        
        .card-nav a:hover { color: #C4A35A; }
        
        .card-social {
            display: flex;
            gap: 15px;
        }
        
        .card-social a {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            color: rgba(255,255,255,0.5);
            transition: all 0.3s;
        }
        
        .card-social a:hover {
            border-color: #C4A35A;
            color: #C4A35A;
            box-shadow: 0 0 15px rgba(196, 163, 90, 0.3);
        }
        
        /* Main Content */
        .card-content {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            min-height: 500px;
        }
        
        /* 3D Product Display */
        .product-3d-area {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: 
                repeating-linear-gradient(0deg, transparent, transparent 50px, rgba(196, 163, 90, 0.02) 50px, rgba(196, 163, 90, 0.02) 51px),
                repeating-linear-gradient(90deg, transparent, transparent 50px, rgba(196, 163, 90, 0.02) 50px, rgba(196, 163, 90, 0.02) 51px);
        }
        
        .product-3d-placeholder {
            position: relative;
            width: 100%;
            max-width: 350px;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .product-3d-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 30px 60px rgba(0,0,0,0.5));
            transition: transform 0.5s ease;
        }
        
        .product-3d-placeholder:hover img {
            transform: scale(1.05) rotateY(5deg);
        }
        
        /* Badges */
        .badge-3d {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 8px 16px;
            background: rgba(196, 163, 90, 0.9);
            color: #0A0A0A;
            font-family: 'Menlo', monospace;
            font-size: 9px;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-radius: 4px;
        }
        
        .badge-nft {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 8px 16px;
            background: rgba(196, 163, 90, 0.15);
            border: 1px solid #C4A35A;
            color: #C4A35A;
            font-family: 'Menlo', monospace;
            font-size: 9px;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .badge-nft svg {
            width: 12px;
            height: 12px;
        }
        
        /* Navigation Arrows */
        .product-nav-arrows {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
        }
        
        .nav-arrow {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(196, 163, 90, 0.3);
            border-radius: 50%;
            color: #C4A35A;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(26, 26, 26, 0.8);
            backdrop-filter: blur(10px);
        }
        
        .nav-arrow:hover {
            background: #C4A35A;
            color: #0A0A0A;
            box-shadow: 0 0 20px rgba(196, 163, 90, 0.5);
        }
        
        /* Product Details */
        .product-details {
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-left: 1px solid rgba(255,255,255,0.05);
        }
        
        .product-title-3d {
            font-family: 'Times New Roman MT', serif;
            font-size: clamp(28px, 4vw, 42px);
            font-weight: 400;
            letter-spacing: 0.1em;
            color: #FFFFFF;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        
        .product-subtitle {
            font-family: 'Menlo', monospace;
            font-size: 11px;
            letter-spacing: 3px;
            color: #C4A35A;
            text-transform: uppercase;
            margin-bottom: 20px;
        }
        
        /* Price */
        .price-selector {
            margin-bottom: 25px;
        }
        
        .price-label {
            font-family: 'Menlo', monospace;
            font-size: 9px;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        
        .price-options {
            display: flex;
            gap: 10px;
        }
        
        .price-option {
            padding: 12px 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: rgba(255,255,255,0.6);
            font-family: 'Menlo', monospace;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .price-option:hover,
        .price-option.active {
            background: rgba(196, 163, 90, 0.1);
            border-color: #C4A35A;
            color: #FFFFFF;
        }
        
        .price-option.active {
            box-shadow: 0 0 20px rgba(196, 163, 90, 0.2);
        }
        
        /* Size Selector */
        .size-selector-3d {
            margin-bottom: 25px;
        }
        
        .size-label {
            font-family: 'Menlo', monospace;
            font-size: 9px;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        
        .size-options {
            display: flex;
            gap: 10px;
        }
        
        .size-option {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: rgba(255,255,255,0.6);
            font-family: 'Menlo', monospace;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .size-option:hover,
        .size-option.active {
            background: rgba(196, 163, 90, 0.1);
            border-color: #C4A35A;
            color: #FFFFFF;
        }
        
        .size-option.active {
            background: #C4A35A;
            color: #0A0A0A;
            border-color: #C4A35A;
        }
        
        /* Quantity */
        .quantity-selector {
            margin-bottom: 25px;
        }
        
        .quantity-label {
            font-family: 'Menlo', monospace;
            font-size: 9px;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        
        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .qty-btn {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #FFFFFF;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .qty-btn:hover {
            background: rgba(196, 163, 90, 0.1);
            border-color: #C4A35A;
        }
        
        .qty-display {
            font-family: 'Menlo', monospace;
            font-size: 18px;
            color: #FFFFFF;
            min-width: 40px;
            text-align: center;
        }
        
        /* Premium CTA */
        .btn-buy-3d {
            width: 100%;
            padding: 20px;
            background: #F5F5F0;
            border: none;
            border-radius: 12px;
            color: #0A0A0A;
            font-family: 'Times New Roman MT', serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .btn-buy-3d::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(196, 163, 90, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .btn-buy-3d:hover {
            box-shadow: 0 10px 40px rgba(196, 163, 90, 0.4), 0 0 60px rgba(196, 163, 90, 0.2);
            transform: translateY(-2px);
        }
        
        .btn-buy-3d:hover::before {
            width: 300px;
            height: 300px;
        }
        
        .btn-buy-3d span:last-child {
            font-family: 'Menlo', monospace;
        }
        
        /* Trust Elements */
        .trust-row {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        
        .trust-badge {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            background: rgba(196, 163, 90, 0.05);
            border: 1px solid rgba(196, 163, 90, 0.2);
            border-radius: 8px;
            font-family: 'Menlo', monospace;
            font-size: 9px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
        }
        
        .trust-badge svg {
            width: 14px;
            height: 14px;
            color: #C4A35A;
        }
        
        /* Footer */
        .footer-3d {
            padding: 40px;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        
        .footer-3d p {
            font-family: 'Menlo', monospace;
            font-size: 10px;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.3);
        }
        
        /* Responsive */
        @media (max-width: 900px) {
            .card-content {
                grid-template-columns: 1fr;
            }
            
            .product-details {
                border-left: none;
                border-top: 1px solid rgba(255,255,255,0.05);
            }
            
            .card-top {
                flex-direction: column;
                gap: 15px;
            }
        }
        
        @media (max-width: 600px) {
            .showcase-container {
                padding: 20px;
            }
            
            .glass-card {
                border-radius: 16px;
            }
            
            .product-details {
                padding: 30px 20px;
            }
            
            .price-options,
            .size-options {
                flex-wrap: wrap;
            }
            
            .trust-row {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="showcase-container">
        <!-- Background Text -->
        <div class="bg-text-3d left">SHIRT</div>
        <div class="bg-text-3d right">JACKET</div>
        
        <!-- Glass Card -->
        <div class="glass-card">
            <!-- Top Bar -->
            <div class="card-top">
                <div class="card-nav">
                    <a href="index.html">← Products</a>
                    <a href="product.html">Details</a>
                    <a href="#">Contact</a>
                </div>
                <div class="card-social">
                    <a href="https://tiktok.com/@joisleather" target="_blank">

                    </a>
                    <a href="#">

                    </a>
                </div>
            </div>
            
            <!-- Main Content -->
            <div class="card-content">
                <!-- 3D Product Display -->
                <div class="product-3d-area">
                    <div class="product-3d-placeholder">
                        <div class="badge-3d">Premium Leather</div>
                        <div class="badge-nft">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="20 6 9 17 4 12"/>
                            </svg>
                            NFT Verified
                        </div>
                        <img src="https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=600&q=90" alt="Shirt Jacket">
                    </div>
                    <div class="product-nav-arrows">
                        <button class="nav-arrow" onclick="prevProduct()">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
                        </button>
                        <button class="nav-arrow" onclick="nextProduct()">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
                        </button>
                    </div>
                </div>
                
                <!-- Product Details -->
                <div class="product-details">
                    <h1 class="product-title-3d">Shirt Jacket</h1>
                    <p class="product-subtitle">Maison de Cuir — Mexico City</p>
                    
                    <!-- Price -->
                    <div class="price-selector">
                        <p class="price-label">Select Currency</p>
                        <div class="price-options">
                            <button class="price-option active" data-price="6650" onclick="selectPrice(this)">$6,650 MXN</button>
                            <button class="price-option" data-price="380" onclick="selectPrice(this)">$380 USD</button>
                            <button class="price-option" data-crypto="BTC" onclick="selectPrice(this)">₿ Crypto</button>
                        </div>
                    </div>
                    
                    <!-- Size -->
                    <div class="size-selector-3d">
                        <p class="size-label">Select Size</p>
                        <div class="size-options">
                            <button class="size-option">XS</button>
                            <button class="size-option">S</button>
                            <button class="size-option active">M</button>
                            <button class="size-option">L</button>
                            <button class="size-option">XL</button>
                        </div>
                    </div>
                    
                    <!-- Quantity -->
                    <div class="quantity-selector">
                        <p class="quantity-label">Quantity</p>
                        <div class="quantity-controls">
                            <button class="qty-btn" onclick="updateQty(-1)">−</button>
                            <span class="qty-display" id="qtyDisplay">1</span>
                            <button class="qty-btn" onclick="updateQty(1)">+</button>
                        </div>
                    </div>
                    
                    <!-- Buy Button -->
                    <button class="btn-buy-3d" onclick="addToCart3D()">
                        <span>Add to Collection</span>
                        <span>$6,650 MXN</span>
                    </button>
                    
                    <!-- Trust Row -->
                    <div class="trust-row">
                        <div class="trust-badge">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                            </svg>
                            Handcrafted
                        </div>
                        <div class="trust-badge">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                <path d="M7 11V7a5 5 0 0110 0v4"/>
                            </svg>
                            Limited Run
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Footer -->
            <div class="footer-3d">
                <p>> JOIS_LEATHER // SECURE_CONNECTION_ACTIVE // NFT_VERIFIED</p>
            </div>
        </div>
    </div>
    
    <script>
        let qty = 1;
        let currentPrice = 6650;
        
        function updateQty(change) {
            qty = Math.max(1, qty + change);
            document.getElementById('qtyDisplay').textContent = qty;
        }
        
        function selectPrice(btn) {
            document.querySelectorAll('.price-option').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            const price = btn.dataset.price;
            if (price) {
                currentPrice = parseInt(price);
                const symbol = btn.textContent.includes('MXN') ? '$' : '';
                document.querySelector('.btn-buy-3d span:last-child').textContent = `${symbol}${parseInt(price).toLocaleString()} ${btn.textContent.includes('MXN') ? 'MXN' : 'USD'}`;
            }
        }
        
        // Price selector
        document.querySelectorAll('.price-option').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.price-option').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
        });
        
        // Size selector
        document.querySelectorAll('.size-option').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.size-option').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
        });
        
        // Add to cart
        function addToCart3D() {
            const productName = 'Shirt Jacket - ' + document.querySelector('.size-option.active').textContent;
            const image = 'https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=400&q=80';
            
            if (typeof addToCart === 'function') {
                addToCart(productName, currentPrice, image, document.querySelector('.size-option.active').textContent);
            }
            
            // Visual feedback
            const btn = document.querySelector('.btn-buy-3d');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span>Added ✓</span><span>$6,650 MXN</span>';
            btn.style.background = '#C4A35A';
            
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.style.background = '';
            }, 2000);
        }

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Cuenta — JOIS</title>
    <link rel="stylesheet" href="../styles-luxury.css">
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    
    <style>
        /* ============================================
           JOIS DASHBOARD - PRIVATE MEMBERS CLUB
           ============================================ */
        
        * { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #000000;
            color: #F5F5F0;
            font-weight: 300;
            min-height: 100vh;
        }
        
        a { text-decoration: none; color: inherit; }
        
        /* Header */
        .dashboard-header {
            padding: 30px 50px;
            background: #0A0A0A;
            border-bottom: 1px solid #3A3A3A;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .dashboard-logo {
            font-family: 'Times New Roman MT', serif;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: #F5F5F0;
        }
        
        .dashboard-user {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .user-name {
            font-size: 12px;
            color: rgba(245, 245, 240, 0.5);
            letter-spacing: 0.1em;
        }
        
        .user-name span {
            color: #C4A35A;
        }
        
        /* Container */
        .dashboard-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 80px 40px;
        }
        
        /* Page Title */
        .page-title {
            font-family: 'Times New Roman MT', serif;
            font-size: 32px;
            letter-spacing: 0.05em;
            color: #F5F5F0;
            margin-bottom: 10px;
        }
        
        .page-subtitle {
            font-size: 12px;
            color: rgba(245, 245, 240, 0.5);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 60px;
        }
        
        /* Section */
        .dashboard-section {
            margin-bottom: 60px;
        }
        
        .section-title {
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(245, 245, 240, 0.5);
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #3A3A3A;
        }
        
        /* Account Item */
        .account-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 0;
            border-bottom: 1px solid #3A3A3A;
        }
        
        .account-item:last-child {
            border-bottom: none;
        }
        
        .account-item-label {
            font-size: 14px;
            color: #F5F5F0;
            letter-spacing: 0.02em;
        }
        
        .account-item-value {
            font-size: 13px;
            color: rgba(245, 245, 240, 0.5);
            font-family: 'Menlo', monospace;
        }
        
        .account-link {
            font-size: 13px;
            color: rgba(245, 245, 240, 0.5);
            transition: color 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .account-link:hover {
            color: #F5F5F0;
        }
        
        .account-link svg {
            width: 16px;
            height: 16px;
        }
        
        /* Orders */
        .orders-list {
            margin-top: 20px;
        }
        
        .order-item {
            padding: 25px 0;
            border-bottom: 1px solid #3A3A3A;
        }
        
        .order-item:last-child {
            border-bottom: none;
        }
        
        .order-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        
        .order-id {
            font-family: 'Menlo', monospace;
            font-size: 13px;
            color: #F5F5F0;
        }
        
        .order-date {
            font-size: 11px;
            color: rgba(245, 245, 240, 0.4);
            letter-spacing: 0.1em;
        }
        
        .order-details {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .order-product {
            font-size: 14px;
            color: rgba(245, 245, 240, 0.7);
        }
        
        .order-total {
            font-family: 'Menlo', monospace;
            font-size: 14px;
            color: #C4A35A;
        }
        
        /* Logout Button */
        .btn-logout {
            width: 100%;
            padding: 20px;
            font-size: 11px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            background: transparent;
            color: rgba(245, 245, 240, 0.5);
            border: 1px solid #3A3A3A;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 40px;
        }
        
        .btn-logout:hover {
            border-color: #F5F5F0;
            color: #F5F5F0;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .dashboard-header {
                padding: 20px 20px;
            }
            
            .dashboard-container {
                padding: 60px 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="dashboard-header">
        <a href="../index.html" class="dashboard-logo">JOIS</a>
        <div class="dashboard-user">
            <span class="user-name">Miembro: <span>@usuario</span></span>
        </div>
    </header>
    
    <!-- Main Content -->
    <div class="dashboard-container">
        <h1 class="page-title">Mi Cuenta</h1>
        <p class="page-subtitle">Portal de Membresía</p>
        
        <!-- Account Details -->
        <div class="dashboard-section">
            <h2 class="section-title">Información de la Cuenta</h2>
            
            <div class="account-item">
                <span class="account-item-label">Nombre</span>
                <span class="account-item-value">Usuario</span>
            </div>
            <div class="account-item">
                <span class="account-item-label">Email</span>
                <span class="account-item-value">usuario@email.com</span>
            </div>
            <div class="account-item">
                <span class="account-item-label">Miembro desde</span>
                <span class="account-item-value">2024</span>
            </div>
        </div>
        
        <!-- Orders -->
        <div class="dashboard-section">
            <h2 class="section-title">Órdenes Recientes</h2>
            
            <div class="orders-list">
                <div class="order-item">
                    <div class="order-header">
                        <span class="order-id">#1024</span>
                        <span class="order-date">2024-04-20</span>
                    </div>
                    <div class="order-details">
                        <span class="order-product">Shirt Jacket</span>
                        <span class="order-total">$6,650 MXN</span>
                    </div>
                </div>
                
                <div class="order-item">
                    <div class="order-header">
                        <span class="order-id">#1023</span>
                        <span class="order-date">2024-04-15</span>
                    </div>
                    <div class="order-details">
                        <span class="order-product">Bomber</span>
                        <span class="order-total">$9,100 MXN</span>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Quick Links -->
        <div class="dashboard-section">
            <h2 class="section-title">Accesos Rápidos</h2>
            
            <div class="account-item">
                <a href="../index.html" class="account-link">
                    Tienda
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </a>
            </div>
            <div class="account-item">
                <a href="../nft.html" class="account-link">
                    NFT Collection
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </a>
            </div>
        </div>
        
        <!-- Logout -->
        <button class="btn-logout">Cerrar Sesión</button>
    </div>
</body>
</html>
